name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build mycel
        run: |
          cd mycel
          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mycel ../mycel-x86_64

      - name: Build mycel-pkg
        run: |
          cd mycel-pkg
          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mycel-pkg ../mycel-pkg-x86_64

      - name: Build fessus-init
        run: |
          cd fessus/fessus-init
          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/fessus-init ../../fessus-init-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: MycelOS ${{ github.ref_name }}
          body: |
            ## MycelOS ${{ github.ref_name }}

            ### Downloads
            | Binary | Description |
            |---|---|
            | `mycel-x86_64` | System manager CLI |
            | `mycel-pkg-x86_64` | Package manager |
            | `fessus-init-x86_64` | FessusDE config generator |

            ### Install
            ```bash
            curl -sL https://github.com/mycel-linux/mycel-os/releases/download/${{ github.ref_name }}/mycel-x86_64 -o mycel
            chmod +x mycel
            sudo mv mycel /usr/local/bin/
            ```
          files: |
            mycel-x86_64
            mycel-pkg-x86_64
            fessus-init-x86_64
          draft: false
          prerelease: true
