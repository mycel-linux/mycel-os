---
extraMounts:
  - device: proc
    fs: proc
    mountPoint: /proc
  - device: sys
    fs: sysfs
    mountPoint: /sys
  - device: /dev
    mountPoint: /dev
    options: bind
  - device: tmpfs
    fs: tmpfs
    mountPoint: /run
  - device: /run/udev
    mountPoint: /run/udev
    options: bind

extraMountsEfi:
  - device: efivarfs
    fs: efivarfs
    mountPoint: /sys/firmware/efi/efivars

# btrfs subvolume layout for MycelOS generation rollback.
# @          becomes /
# @home      becomes /home (excluded from rollback)
# @snapshots becomes /.snapshots (holds generation snapshots)
btrfsSubvolumes:
  - subvolume: /@
    mountPoint: /
  - subvolume: /@home
    mountPoint: /home
  - subvolume: /@snapshots
    mountPoint: /.snapshots
