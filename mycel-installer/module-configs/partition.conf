---
efiSystemPartition: /boot/efi
efiSystemPartitionSize: 512MiB
efiSystemPartitionName: EFI

# Swap partition — create if RAM < 8GB
ensureSuspendToDisk: true
neverCreateSwap: false

# btrfs is the default so generation snapshots and boot rollback work.
# ext4/xfs still selectable, but rollback is unavailable on them.
defaultFileSystemType: btrfs

availableFileSystemTypes:
  - btrfs
  - ext4
  - xfs

# Subvolume layout MycelOS expects:
#   @         → mounted at /        (rolled back per generation)
#   @home     → mounted at /home    (never touched by rollback)
#   @snapshots→ mounted at /.snapshots
btrfsSwap: none

defaultPartitionTableType: gpt
