---
# Copy from the live squashfs, re-mounted at /run/mycelos/squashfs by rc.init.
# We can't use the .sfs on the ISO or /run/rootfsbase (s6-linux-init's /run
# tmpfs shadows dracut's mounts), and we can't use "/" directly because the
# module's `find / -type f` file-count chokes on /proc, /sys and special files.
# /run/mycelos/squashfs is a clean rootfs tree, so `find` and rsync both work.
# sourcefs "file" = the module's "copy a directory directly, don't mount" mode.
unpack:
  - source: /run/mycelos/squashfs
    sourcefs: "file"
    destination: ""
